services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["./nme-server"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5051:8080"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["./nme-worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nme
      POSTGRES_PASSWORD: nme
      POSTGRES_DB: nme_v9
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nme -d nme_v9"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
