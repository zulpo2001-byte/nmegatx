<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支付结果 — NME v9</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 48px 40px; max-width: 460px; width: 90%; text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    .title { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
    .sub   { font-size: 15px; color: #666; margin-bottom: 32px; line-height: 1.6; }
    .countdown { font-size: 13px; color: #999; margin-bottom: 24px; }
    .countdown span { font-weight: 600; color: #4f46e5; }
    .btn {
      display: inline-block; padding: 12px 32px; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      text-decoration: none; border: none; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary  { background: #4f46e5; color: #fff; }
    .btn-secondary{ background: #e5e7eb; color: #374151; margin-top: 12px; display: block; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e5e7eb;
      border-top-color: #4f46e5; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress { height: 4px; background: #e5e7eb; border-radius: 2px; margin-top: 24px; overflow: hidden; }
    .progress-bar { height: 100%; background: #4f46e5; border-radius: 2px; transition: width .5s linear; }
  </style>
</head>
<body>
<div class="card">
  <div id="state-polling">
    <div class="spinner"></div>
    <div class="title">正在确认支付状态…</div>
    <div class="sub">请稍候，我们正在向支付平台确认您的付款结果</div>
    <div class="countdown">最多等待 <span id="poll-remaining">210</span> 秒</div>
    <div class="progress"><div class="progress-bar" id="progress-bar" style="width:100%"></div></div>
  </div>

  <div id="state-success" style="display:none">
    <div class="icon">✅</div>
    <div class="title">支付成功！感谢您的购买</div>
    <div class="sub">您的订单已确认，我们将尽快为您处理。</div>
    <div class="countdown"><span id="redirect-count">3</span> 秒后自动跳转…</div>
    <a href="#" id="btn-return" class="btn btn-primary">立即返回商店</a>
  </div>

  <div id="state-fail" style="display:none">
    <div class="icon">❌</div>
    <div class="title">支付未完成</div>
    <div class="sub" id="fail-msg">您的支付已取消或超时，请重新结账。</div>
    <a href="#" id="btn-retry" class="btn btn-primary">重新结账</a>
    <a href="#" id="btn-close" class="btn btn-secondary">关闭此页</a>
  </div>
</div>

<script>
(function(){
  var params      = new URLSearchParams(location.search);
  var token       = params.get('token')       || '';
  var statusParam = params.get('status')      || '';
  var returnURL   = params.get('return_url')  || document.referrer || '/';
  var checkoutURL = params.get('checkout_url')|| returnURL;
  var TIMEOUT_MS  = 210000;
  var POLL_MS     = 2500;
  var pollTimer, countdownTimer, startTime = Date.now();

  function show(id){
    ['state-polling','state-success','state-fail'].forEach(function(s){
      document.getElementById(s).style.display = s===id?'':'none';
    });
  }
  function goTo(url){ if(url&&url!=='#') location.href=url; }

  function onSuccess(data){
    clearInterval(pollTimer);
    show('state-success');
    var rurl = (data&&data.return_url)?data.return_url:returnURL;
    document.getElementById('btn-return').href=rurl;
    document.getElementById('btn-return').onclick=function(e){e.preventDefault();goTo(rurl);};
    var c=3;
    document.getElementById('redirect-count').textContent=c;
    countdownTimer=setInterval(function(){
      c--; document.getElementById('redirect-count').textContent=c;
      if(c<=0){clearInterval(countdownTimer);goTo(rurl);}
    },1000);
  }

  function onFail(reason){
    clearInterval(pollTimer);
    show('state-fail');
    var msg = reason==='abandoned'?'您已超过付款时限，订单已自动关闭。请重新下单。':
              reason==='failed'?'支付失败，请检查付款信息后重试。':'支付未完成，请重新结账。';
    document.getElementById('fail-msg').textContent=msg;
    var curl=checkoutURL!=='#'?checkoutURL:returnURL;
    document.getElementById('btn-retry').href=curl;
    document.getElementById('btn-retry').onclick=function(e){e.preventDefault();goTo(curl);};
    document.getElementById('btn-close').onclick=function(e){
      e.preventDefault(); try{window.close();}catch(err){goTo(curl);}
    };
  }

  function pollStatus(){
    if(!token){onFail('failed');return;}
    fetch('/api/gateway/status/'+encodeURIComponent(token))
      .then(function(r){return r.json();})
      .then(function(res){
        var data=res.data||res;
        var status=data.status||'';
        var elapsed=Date.now()-startTime;
        var pct=Math.max(0,100-elapsed/TIMEOUT_MS*100);
        var bar=document.getElementById('progress-bar');
        if(bar) bar.style.width=pct+'%';
        var rem=document.getElementById('poll-remaining');
        if(rem) rem.textContent=Math.max(0,Math.ceil((TIMEOUT_MS-elapsed)/1000));
        if(status==='completed') onSuccess(data);
        else if(status==='failed') onFail('failed');
        else if(status==='abandoned') onFail('abandoned');
        else if(elapsed>=TIMEOUT_MS) onFail('abandoned');
      }).catch(function(){});
  }

  function startPolling(){ pollStatus(); pollTimer=setInterval(pollStatus,POLL_MS); }

  function init(){
    if(statusParam==='success'||statusParam==='completed'){
      fetch('/api/gateway/status/'+encodeURIComponent(token))
        .then(function(r){return r.json();})
        .then(function(res){
          var s=(res.data||res).status||'';
          if(s==='completed') onSuccess(res.data||res); else startPolling();
        }).catch(startPolling);
      return;
    }
    if(statusParam==='cancel'||statusParam==='failed'){onFail('failed');return;}
    startPolling();
  }

  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible') pollStatus();
  });
  window.addEventListener('beforeunload',function(){
    clearInterval(pollTimer); clearInterval(countdownTimer);
  });
  init();
})();
</script>
</body>
</html>
