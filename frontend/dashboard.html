<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NME Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <style>
    body{margin:0}.layout{height:100vh}.aside{background:#1f2d3d;color:#fff}
    .logo{padding:16px;font-weight:700}.main{background:#f5f7fa;padding:16px}
  </style>
</head>
<body>
<div id="app">
  <el-container class="layout">
    <el-aside width="230px" class="aside">
      <div class="logo">NME 控制台</div>
      <el-menu :default-active="active" background-color="#1f2d3d" text-color="#fff" active-text-color="#ffd04b" @select="onMenu">
        <el-menu-item index="dashboard">概览</el-menu-item>
        <el-menu-item index="orders">订单</el-menu-item>
        <el-menu-item index="paypal">PayPal</el-menu-item>
        <el-menu-item index="stripe">Stripe</el-menu-item>
        <el-menu-item index="webhooks">A/B 端点</el-menu-item>
        <el-menu-item index="api">接口状态</el-menu-item>
      </el-menu>
    </el-aside>
    <el-container>
      <el-header>
        <el-space><el-tag type="success">{{role}}</el-tag><el-button @click="logout">退出</el-button></el-space>
      </el-header>
      <el-main class="main">
        <el-card v-if="active==='dashboard'"><pre>{{pretty(data.dashboard)}}</pre></el-card>
        <el-card v-if="active==='orders'"><pre>{{pretty(data.orders)}}</pre></el-card>
        <el-card v-if="active==='paypal'"><pre>{{pretty(data.paypal)}}</pre></el-card>
        <el-card v-if="active==='stripe'"><pre>{{pretty(data.stripe)}}</pre></el-card>
        <el-card v-if="active==='webhooks'"><pre>{{pretty(data.webhooks)}}</pre></el-card>
        <el-card v-if="active==='api'"><pre>{{pretty(data.health)}}</pre></el-card>
      </el-main>
    </el-container>
  </el-container>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script>
const {createApp, reactive, ref, onMounted} = Vue
createApp({
  setup(){
    const token=localStorage.getItem('nme_access_token')||''; if(!token) location.href='/login.html'
    const active=ref('dashboard'); const role=ref('user')
    const data=reactive({dashboard:{},orders:{},paypal:{},stripe:{},webhooks:{},health:{}})
    const api=async(path)=>{const r=await fetch(path,{headers:{Authorization:'Bearer '+token}});return r.json()}
    const load=async(key)=>{
      const map={dashboard:'/api/user/dashboard',orders:'/api/user/orders',paypal:'/api/user/paypal',stripe:'/api/user/stripe',webhooks:'/api/user/webhooks',api:'/api/health'}
      const j=await api(map[key]); data[key==='api'?'health':key]=j
    }
    const onMenu=(k)=>{active.value=k; load(k).catch(e=>ElementPlus.ElMessage.error(e.message))}
    const me=async()=>{const j=await api('/api/auth/me'); if(j.ok){role.value=j.data?.role||'user'}}
    const logout=()=>{localStorage.removeItem('nme_access_token');location.href='/login.html'}
    const pretty=(v)=>JSON.stringify(v,null,2)
    onMounted(async()=>{await me();await load('dashboard')})
    return {active, role, data, onMenu, logout, pretty}
  }
}).use(ElementPlus).mount('#app')
</script>
</body>
</html>
