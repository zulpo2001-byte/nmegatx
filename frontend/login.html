<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NME SaaS — 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:'Inter',system-ui,sans-serif}
.card{width:400px;background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:28px;font-weight:800;color:#f1f5f9;letter-spacing:-0.5px}
.logo h1 span{color:#6366f1}
.logo p{color:#64748b;font-size:14px;margin-top:4px}
.form-group{margin-bottom:20px}
label{display:block;color:#94a3b8;font-size:13px;font-weight:500;margin-bottom:8px}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 16px;color:#f1f5f9;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:#6366f1}
.btn{width:100%;background:#6366f1;color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:#4f46e5}
.btn:disabled{background:#475569;cursor:not-allowed}
.error{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:16px;display:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>NME <span>SaaS</span></h1>
    <p>多用户支付中控系统 v9.0</p>
  </div>
  <div class="error" id="errMsg"></div>
  <div class="form-group">
    <label>邮箱</label>
    <input type="email" id="email" placeholder="admin@nme.local" autocomplete="username">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  const btn   = document.getElementById('loginBtn');
  const errEl = document.getElementById('errMsg');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;

  errEl.style.display = 'none';
  if (!email || !pass) { showErr('请填写邮箱和密码'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>登录中…';

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify({email, password: pass}),
    });
    const data = await res.json();

    if (!res.ok || !data.ok) { showErr(data.message || '登录失败'); return; }

    // Go v9 response: {ok:true, data:{access_token, refresh_token,...}}
    localStorage.setItem('nme_token', data.data.access_token);
    if (data.data.refresh_token) localStorage.setItem('nme_refresh_token', data.data.refresh_token);
    // dashboard 会再调用 /api/auth/me 获取 user/permissions
    window.location.href = '/dashboard.html';
  } catch(e) {
    showErr('网络错误，请稍后重试');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '登 录';
  }
}

// 已登录则直接跳转
if (localStorage.getItem('nme_token')) {
  window.location.href = '/dashboard.html';
}
</script>
</body>
</html>
