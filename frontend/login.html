<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NME 登录</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <style>
    body{margin:0;background:#f5f7fa;font-family:Inter,Arial}
    .wrap{height:100vh;display:flex;align-items:center;justify-content:center}
    .card{width:380px}
  </style>
</head>
<body>
<div id="app" class="wrap">
  <el-card class="card" shadow="hover">
    <template #header><b>NME 管理系统登录</b></template>
    <el-form :model="form" @submit.prevent>
      <el-form-item label="邮箱"><el-input v-model="form.email" /></el-form-item>
      <el-form-item label="密码"><el-input v-model="form.password" show-password type="password" /></el-form-item>
      <el-button type="primary" :loading="loading" @click="login" style="width:100%">登录</el-button>
    </el-form>
  </el-card>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script>
const {createApp, reactive, ref} = Vue
createApp({
  setup(){
    const form = reactive({email:'', password:''});
    const loading = ref(false)
    const login = async()=>{
      loading.value=true
      try{
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)})
        const j=await r.json();
        if(!j.ok) throw new Error(j.message||'登录失败')
        localStorage.setItem('nme_access_token', j.data.access_token)
        localStorage.setItem('nme_refresh_token', j.data.refresh_token||'')
        window.location.href='/dashboard.html'
      }catch(e){ElementPlus.ElMessage.error(e.message)}
      finally{loading.value=false}
    }
    return {form, loading, login}
  }
}).use(ElementPlus).mount('#app')
</script>
</body>
</html>
